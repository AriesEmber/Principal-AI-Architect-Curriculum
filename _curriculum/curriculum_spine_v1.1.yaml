modules:
- module_id: M01
  domain_id: D01
  title: First Contact with the Terminal
  lesson_count: 7
  module_learning_objective: Open, navigate, and operate a terminal on the learner's own machine with confidence
  capstone_description: A three-paragraph terminal session transcript showing the learner creating a project folder, navigating
    into it, creating and listing files, all from the command line with no mouse.
  capstone_lesson_id: L-007
- module_id: M02
  domain_id: D01
  title: Files, Editors, and Package Managers
  lesson_count: 6
  module_learning_objective: Install software, edit plain-text files, and manage the operating system environment from the
    command line
  capstone_description: Install a package manager (Homebrew or winget), install three tools with it, then write a short README
    explaining what each does, all without using a graphical application.
  capstone_lesson_id: L-013
- module_id: M03
  domain_id: D02
  title: Version Control First Principles
  lesson_count: 5
  module_learning_objective: Initialize a repository, commit changes, and understand why version control exists
  capstone_description: A local repository with at least five commits showing a deliberate history of changes, plus a written
    explanation of why each commit is separate.
  capstone_lesson_id: L-018
- module_id: M04
  domain_id: D02
  title: GitHub and Collaboration Flow
  lesson_count: 6
  module_learning_objective: Push code to GitHub, work on branches, open a pull request, and resolve a merge conflict
  capstone_description: A public GitHub repository with a README, a feature branch merged via pull request, and a deliberately-created-and-resolved
    merge conflict documented in the commit history.
  capstone_lesson_id: L-024
- module_id: M05
  domain_id: D03
  title: Installing Python and First Programs
  lesson_count: 6
  module_learning_objective: Install Python cleanly, run code in a REPL and as a script, and produce a first working program
  capstone_description: A Python script that prints a multi-line message, reads input from the user, and writes the combined
    result to a file , run from the terminal.
  capstone_lesson_id: L-030
- module_id: M06
  domain_id: D03
  title: Types, Control Flow, and Functions
  lesson_count: 7
  module_learning_objective: Use Python's core data types, conditionals, loops, and user-defined functions to solve small
    problems
  capstone_description: A Python program that reads a list of numbers, filters them, transforms them with a function, and
    writes a summary to a file, structured with at least three functions.
  capstone_lesson_id: L-037
- module_id: M07
  domain_id: D03
  title: Collections, Files, and Errors
  lesson_count: 6
  module_learning_objective: Work with lists, dictionaries, and sets; read and write files; handle exceptions
  capstone_description: A Python script that reads a CSV of fictional grocery items, counts items per category using a dictionary,
    handles a missing-file error gracefully, and writes a summary CSV.
  capstone_lesson_id: L-043
- module_id: M08
  domain_id: D03
  title: Projects, Environments, and Packages
  lesson_count: 7
  module_learning_objective: Structure a multi-file project, use virtual environments, and install third-party packages
  capstone_description: A multi-file Python project in a Git repository with a virtual environment, a pinned requirements.txt,
    and at least one third-party package actually used.
  capstone_lesson_id: L-050
- module_id: M09
  domain_id: D04
  title: What Data Actually Is
  lesson_count: 7
  module_learning_objective: Build a working conceptual model of structured, semi-structured, and unstructured data and recognize
    common formats
  capstone_description: A one-page written inventory classifying ten real-world artifacts (a photo, a spreadsheet, an email,
    a PDF, etc.) by data type, format, and likely storage choice.
  capstone_lesson_id: L-057
- module_id: M10
  domain_id: D05
  title: SQL from Zero
  lesson_count: 7
  module_learning_objective: Load data into a local SQLite database and write SELECT, WHERE, GROUP BY, and JOIN queries
  capstone_description: A SQLite database loaded with a synthetic two-table dataset (customers and orders) plus a documented
    query file answering five realistic business questions using joins and aggregations.
  capstone_lesson_id: L-064
- module_id: M11
  domain_id: D05
  title: SQL for Analysis
  lesson_count: 6
  module_learning_objective: Use CTEs, window functions, and subqueries to answer analytical questions
  capstone_description: An analytical query file against the same synthetic dataset producing running totals, rankings within
    groups, and a time-based comparison, each query commented with what it does and why.
  capstone_lesson_id: L-070
- module_id: M12
  domain_id: D06
  title: Running a Language Model on Your Laptop
  lesson_count: 7
  module_learning_objective: Install Ollama, run models locally, and call them from Python
  capstone_description: A Python script that calls a local Ollama model twice, once with a system prompt, once without, and
    writes both outputs side by side to a markdown file for comparison.
  capstone_lesson_id: L-077
- module_id: M13
  domain_id: D06
  title: Tokens, Embeddings, and the Shape of a Model
  lesson_count: 6
  module_learning_objective: Build working intuition about tokens, context windows, embeddings, and model sizing
  capstone_description: A short script that tokenizes three sample texts of different lengths, measures context usage, generates
    embeddings for ten sentences, and computes cosine similarity between them, with a written paragraph explaining what the
    numbers mean.
  capstone_lesson_id: L-083
- module_id: M14
  domain_id: D07
  title: Prompting, Structured Output, and Tool Use
  lesson_count: 10
  module_learning_objective: Write reliable prompts, coerce structured output, and build a simple tool-use loop
  capstone_description: A working prompt template library in a Python file with four prompts (extraction, classification,
    rewriting, and summarization), each tested against five inputs, with results saved and a short analysis of where each
    prompt fails.
  capstone_lesson_id: L-093
- module_id: M15
  domain_id: D08
  title: HTTP, REST, and Calling APIs from Python
  lesson_count: 7
  module_learning_objective: Understand HTTP and authenticate to real APIs from Python code
  capstone_description: A Python script that calls a free public API (e.g., Open-Meteo weather), handles errors and rate limits,
    caches responses to a local file, and formats the result as a human-readable report.
  capstone_lesson_id: L-100
- module_id: M16
  domain_id: D08
  title: Tool-Calling and the Model Context Protocol
  lesson_count: 6
  module_learning_objective: Build a tool-use loop where a local model invokes a Python function, and understand MCP conceptually
  capstone_description: A Python program where a local Ollama model is given two tools (a calculator and a file reader), calls
    them in response to natural-language prompts, and produces a trace log of what was called and why.
  capstone_lesson_id: L-106
- module_id: M17
  domain_id: D09
  title: What the Cloud Actually Is
  lesson_count: 6
  module_learning_objective: Build a working mental model of IaaS, PaaS, and SaaS, regions, and the console-vs-CLI distinction
  capstone_description: A one-page diagram (hand-drawn or drawn with draw.io) showing the same small application deployed
    three ways, as IaaS, PaaS, and SaaS, with the responsibility boundary marked on each.
  capstone_lesson_id: L-112
- module_id: M18
  domain_id: D09
  title: Azure as the Primary Hands-On Cloud
  lesson_count: 7
  module_learning_objective: Provision, use, and tear down basic compute, storage, and identity resources on Azure through
    the free tier
  capstone_description: An Azure resource group containing a storage account, a virtual machine, and a managed identity, all
    created through the Azure CLI, documented in a README, and torn down cleanly at the end.
  capstone_lesson_id: L-119
- module_id: M19
  domain_id: D09
  title: AWS and Google Cloud Platform Equivalents
  lesson_count: 7
  module_learning_objective: Replicate the same hands-on exercises on AWS and GCP and produce a cross-cloud mapping
  capstone_description: A three-column comparison table (Azure, AWS, GCP) covering compute, storage, networking, identity,
    and managed AI services , with a short written narrative on where each cloud's philosophy differs.
  capstone_lesson_id: L-126
- module_id: M20
  domain_id: D10
  title: Terraform First Principles
  lesson_count: 7
  module_learning_objective: Install Terraform, understand the init-plan-apply-destroy cycle, and provision a first resource
  capstone_description: A Terraform configuration that provisions a storage bucket on Azure, a Git repository with state configured,
    and a written paragraph explaining why the state file must never be committed.
  capstone_lesson_id: L-133
- module_id: M21
  domain_id: D10
  title: Modules, State, and Multi-Cloud Patterns
  lesson_count: 7
  module_learning_objective: Use modules, remote state, and variables to build reusable infrastructure code
  capstone_description: A Terraform module that provisions equivalent storage on Azure and on AWS, selected by a variable,
    with remote state configured , plus a written explanation of what this abstracts and what it does not.
  capstone_lesson_id: L-140
- module_id: M22
  domain_id: D11
  title: Secrets, Identity, and Access
  lesson_count: 6
  module_learning_objective: Manage credentials safely, use environment variables and secret managers, and apply least privilege
  capstone_description: A refactored version of an earlier project where all credentials have been moved out of code into
    environment variables and a secret manager, with a written audit of what changed and why.
  capstone_lesson_id: L-146
- module_id: M23
  domain_id: D11
  title: 'Governing AI: PII, PHI, Bias, and the Regulatory Landscape'
  lesson_count: 7
  module_learning_objective: Recognize sensitive data, evaluate models for bias, and navigate the current AI regulatory landscape
  capstone_description: A data flow diagram for a realistic healthcare AI use case, annotated with where PII and PHI exist,
    which controls protect them, and which sections of HIPAA and the EU AI Act apply.
  capstone_lesson_id: L-153
- module_id: M24
  domain_id: D12
  title: Reading and Producing Architecture Diagrams
  lesson_count: 6
  module_learning_objective: Read reference architectures critically and produce a target-state diagram for a realistic AI
    system
  capstone_description: A target-state architecture diagram for a healthcare RAG system with labeled data flows, security
    boundaries, and governance controls, drawn in draw.io or a similar tool and exported as SVG.
  capstone_lesson_id: L-159
- module_id: M25
  domain_id: D12
  title: Designing a Production RAG and LLMOps Pipeline
  lesson_count: 6
  module_learning_objective: Design a retrieval-augmented generation system and an LLMOps pipeline end-to-end
  capstone_description: 'A two-page solution design document for a RAG system: ingestion, chunking, embedding, retrieval,
    generation, evaluation, and LLMOps pipeline, with trade-offs explicitly called out.'
  capstone_lesson_id: L-165
- module_id: M26
  domain_id: D12
  title: Capstone, Enterprise AI Architecture Portfolio
  lesson_count: 6
  module_learning_objective: Synthesize everything into a principal-architect-level portfolio artifact
  capstone_description: 'A complete architecture portfolio deliverable: executive summary, reference architecture diagram,
    solution design document, cost model, and a five-minute recorded walkthrough explaining the design to a non-technical
    audience.'
  capstone_lesson_id: L-171
lessons:
- module_id: M01
  domain_id: D01
  title: Open the terminal with a keyboard shortcut
  learning_objective: Launch a terminal application on the learner's own operating system using only the keyboard
  prerequisite_lesson_ids: []
  analogy_anchor: Opening the kitchen door before you cook, you can't do anything in the kitchen until you are actually in
    it.
  hands_on_action: Open Terminal (macOS), Windows Terminal (Windows), or GNOME Terminal (Linux) using the system keyboard
    shortcut; leave it open.
  verification: A terminal window is visible on screen with a blinking cursor and a prompt like 'user@machine:~$'.
  extension: Customize the terminal window size and font size for comfortable reading.
  acronyms_used:
  - CLI
  - OS
  capture_mode: script_only
  risk_level: low
  estimated_minutes: 10
  is_capstone: false
  lesson_id: L-001
  sequence_number: 1
  week_number: 1
  day_in_week: 1
- module_id: M01
  domain_id: D01
  title: Read a prompt like a sign at a train station
  learning_objective: 'Interpret the parts of a shell prompt: user, machine, current directory, and prompt character'
  prerequisite_lesson_ids:
  - L-001
  analogy_anchor: 'A train station sign: it tells you where you are (platform), who is there (line), and where you can go
    next (destination).'
  hands_on_action: Look at the current prompt and write down in a note what each piece of text before the '$' or '%' represents.
  verification: The learner can identify username, hostname, and current directory from their prompt without looking it up.
  extension: Change the shell prompt format by editing the PS1 environment variable (preview only, deeper lesson later).
  acronyms_used:
  - CLI
  - PS1
  capture_mode: script_only
  risk_level: low
  estimated_minutes: 10
  is_capstone: false
  lesson_id: L-002
  sequence_number: 2
  week_number: 1
  day_in_week: 2
- module_id: M01
  domain_id: D01
  title: Print your first line with echo
  learning_objective: Execute a command that produces visible output and confirm the command-response rhythm
  prerequisite_lesson_ids:
  - L-002
  analogy_anchor: 'Ringing a bell: you do something, you hear something back. The terminal works the same way.'
  hands_on_action: Type `echo Hello, world` and press Enter; observe the output; try it with quotes and without.
  verification: The text 'Hello, world' appears on the next line and the prompt returns, ready for another command.
  extension: Run `echo` with no arguments and observe what happens; try `echo $USER`.
  acronyms_used:
  - CLI
  capture_mode: terminal_auto
  risk_level: low
  estimated_minutes: 13
  is_capstone: false
  lesson_id: L-003
  sequence_number: 3
  week_number: 1
  day_in_week: 3
- module_id: M01
  domain_id: D01
  title: Find out where you are with pwd
  learning_objective: Identify the current working directory using the pwd command
  prerequisite_lesson_ids:
  - L-003
  analogy_anchor: Looking at the 'You Are Here' arrow on a shopping mall map, you can't plan a route without knowing your
    starting point.
  hands_on_action: Run `pwd`; write down the full path that is returned.
  verification: A line of text starting with `/` (macOS/Linux) or `C:\` (Windows) is printed, showing the absolute path.
  extension: Run `pwd` in a fresh terminal window and notice that the starting directory is usually your home directory.
  acronyms_used:
  - CLI
  - OS
  capture_mode: terminal_auto
  risk_level: low
  estimated_minutes: 13
  is_capstone: false
  lesson_id: L-004
  sequence_number: 4
  week_number: 1
  day_in_week: 4
- module_id: M01
  domain_id: D01
  title: List the contents of a directory with ls
  learning_objective: List files and directories in the current location and recognize the difference between files and folders
  prerequisite_lesson_ids:
  - L-004
  analogy_anchor: Opening a file cabinet drawer to see what's inside before you start looking for a specific document.
  hands_on_action: Run `ls` in the home directory; then run `ls -la` and notice the extra detail.
  verification: The output shows a list of items; with `-la` it shows permissions, owner, size, and date.
  extension: Try `ls` on another directory by passing its path as an argument.
  acronyms_used:
  - CLI
  capture_mode: terminal_auto
  risk_level: low
  estimated_minutes: 13
  is_capstone: false
  lesson_id: L-005
  sequence_number: 5
  week_number: 1
  day_in_week: 5
- module_id: M01
  domain_id: D01
  title: Move around with cd and relative paths
  learning_objective: Change the current working directory using cd with both relative and absolute paths
  prerequisite_lesson_ids:
  - L-005
  analogy_anchor: 'Walking through a house: to get to the kitchen you either say ''go to the kitchen'' (relative) or ''go
    to 123 Main Street, kitchen'' (absolute).'
  hands_on_action: From home, `cd Documents`, then `cd ..`, then `cd /` (or `cd C:\` on Windows); use `pwd` at each step.
  verification: After each `cd`, `pwd` reflects the new directory; the learner can describe why.
  extension: Use `cd -` to jump back to the previous directory.
  acronyms_used:
  - CD
  - CLI
  - OS
  capture_mode: terminal_auto
  risk_level: low
  estimated_minutes: 13
  is_capstone: false
  lesson_id: L-006
  sequence_number: 6
  week_number: 1
  day_in_week: 6
- module_id: M01
  domain_id: D01
  title: Make and remove directories (capstone)
  learning_objective: Create a practice directory, navigate into it, and list its contents, all from the command line
  prerequisite_lesson_ids:
  - L-006
  analogy_anchor: 'Setting up a new filing cabinet for a new project: create the cabinet, open it, confirm it''s empty.'
  hands_on_action: Run `mkdir ~/practice-cli`, `cd ~/practice-cli`, `ls`, then create an empty file with `touch hello.txt`
    and list again.
  verification: The new directory exists, contains hello.txt, and the learner can navigate in and out of it.
  extension: Create nested directories in a single command with `mkdir -p a/b/c` and explore the result.
  acronyms_used:
  - CD
  - CLI
  capture_mode: terminal_auto
  risk_level: low
  estimated_minutes: 13
  is_capstone: true
  lesson_id: L-007
  sequence_number: 7
  week_number: 1
  day_in_week: 7
- module_id: M02
  domain_id: D01
  title: Read a file's contents with cat and less
  learning_objective: Display the contents of a text file in the terminal using cat and page through it with less
  prerequisite_lesson_ids:
  - L-007
  analogy_anchor: 'Reading a letter: cat opens it all at once, less lets you read it page by page.'
  hands_on_action: Create a text file with `echo "line one\nline two\nline three" > notes.txt`, then read it with `cat notes.txt`
    and `less notes.txt` (press q to quit less).
  verification: The file's contents are displayed; the learner knows how to exit less.
  extension: Compare cat and less on a longer file like /etc/services (macOS/Linux) and notice the difference.
  acronyms_used:
  - CLI
  - OS
  capture_mode: terminal_auto
  risk_level: low
  estimated_minutes: 13
  is_capstone: false
  lesson_id: L-008
  sequence_number: 8
  week_number: 2
  day_in_week: 1
- module_id: M02
  domain_id: D01
  title: Edit a file with nano
  learning_objective: Open, edit, and save a plain-text file using the nano terminal editor
  prerequisite_lesson_ids:
  - L-008
  analogy_anchor: 'A typewriter with a help menu along the bottom: the shortcuts are always visible, you just have to read
    them.'
  hands_on_action: Run `nano hello.txt`, type three lines of text, save with Ctrl+O (then Enter), exit with Ctrl+X.
  verification: The file hello.txt contains the typed text when opened again with cat.
  extension: Edit a second file and use Ctrl+W to search within the file.
  acronyms_used:
  - CLI
  capture_mode: terminal_auto
  risk_level: low
  estimated_minutes: 13
  is_capstone: false
  lesson_id: L-009
  sequence_number: 9
  week_number: 2
  day_in_week: 2
- module_id: M02
  domain_id: D01
  title: Understand file paths, extensions, and hidden files
  learning_objective: Distinguish absolute and relative paths, interpret file extensions, and reveal hidden files
  prerequisite_lesson_ids:
  - L-009
  analogy_anchor: 'A postal address: country, city, street, house number. Remove parts from the end to get less specific.'
  hands_on_action: Run `ls -la` in the home directory to reveal hidden files (those starting with `.`); open ~/.bashrc or
    similar with cat.
  verification: The learner can describe what hidden files are used for and why extensions are a convention, not a rule.
  extension: Count how many hidden files exist in the home directory using `ls -la | wc -l`.
  acronyms_used:
  - CLI
  capture_mode: terminal_auto
  risk_level: low
  estimated_minutes: 13
  is_capstone: false
  lesson_id: L-010
  sequence_number: 10
  week_number: 2
  day_in_week: 3
- module_id: M02
  domain_id: D01
  title: Install a package manager
  learning_objective: Install Homebrew (macOS), winget (Windows), or confirm apt (Linux) is present
  prerequisite_lesson_ids:
  - L-010
  analogy_anchor: 'Setting up a delivery subscription: once it''s in place, you can order things to be installed automatically
    instead of going to each store.'
  hands_on_action: Follow the learner's OS-specific install path for a package manager; run the install command; verify with
    `brew --version`, `winget --version`, or `apt --version`.
  verification: The package manager's version number is printed when asked.
  extension: Read the package manager's documentation home page and note how to search for a package.
  acronyms_used:
  - CLI
  - OS
  capture_mode: script_only
  risk_level: medium
  estimated_minutes: 13
  is_capstone: false
  lesson_id: L-011
  sequence_number: 11
  week_number: 2
  day_in_week: 4
- module_id: M02
  domain_id: D01
  title: Install your first tool with a package manager
  learning_objective: Install a terminal tool (tree, wget, or jq) through the package manager and run it
  prerequisite_lesson_ids:
  - L-011
  analogy_anchor: Ordering a kitchen gadget online and using it the same day, faster than driving to the store.
  hands_on_action: Install `tree` via the package manager; run `tree ~/practice-cli` to see a visual folder structure.
  verification: The tree command runs and prints the directory structure in ASCII art.
  extension: Install `jq` or `wget` with the same pattern.
  acronyms_used:
  - CLI
  capture_mode: terminal_auto
  risk_level: medium
  estimated_minutes: 13
  is_capstone: false
  lesson_id: L-012
  sequence_number: 12
  week_number: 2
  day_in_week: 5
- module_id: M02
  domain_id: D01
  title: Set an environment variable and read it back (capstone)
  learning_objective: Set and read an environment variable in the current shell session, understanding that it is scoped to
    that session
  prerequisite_lesson_ids:
  - L-012
  analogy_anchor: 'Writing a note on a whiteboard in one room: it''s useful in that room but disappears when you leave and
    come back to a fresh whiteboard.'
  hands_on_action: Run `export MY_NAME="<learner's name>"` (or `set MY_NAME=...` on Windows cmd), then `echo $MY_NAME`; open
    a new terminal and confirm it's gone.
  verification: The variable prints in the original shell and is empty in a fresh one.
  extension: Research how to make an environment variable persistent via .bashrc or .zshrc (preview, formal lesson later).
  acronyms_used:
  - CLI
  - OS
  - PATH
  - PR
  capture_mode: terminal_auto
  risk_level: low
  estimated_minutes: 13
  is_capstone: true
  lesson_id: L-013
  sequence_number: 13
  week_number: 2
  day_in_week: 6
- module_id: M03
  domain_id: D02
  title: Install Git and confirm the version
  learning_objective: Install Git on the learner's system and verify it runs from the command line
  prerequisite_lesson_ids:
  - L-013
  analogy_anchor: 'Buying a stopwatch for a workshop: you want to be sure the batteries work before the class starts.'
  hands_on_action: Install Git via the package manager; run `git --version`.
  verification: Git's version number is printed.
  extension: Set your global user name and email with `git config --global user.name ...` and `user.email ...` (needed later
    anyway).
  acronyms_used:
  - CLI
  - VCS
  capture_mode: script_only
  risk_level: low
  estimated_minutes: 13
  is_capstone: false
  lesson_id: L-014
  sequence_number: 14
  week_number: 2
  day_in_week: 7
- module_id: M03
  domain_id: D02
  title: Initialize a repository in a folder
  learning_objective: Turn an ordinary folder into a Git repository with git init and confirm the hidden .git directory exists
  prerequisite_lesson_ids:
  - L-014
  analogy_anchor: 'Putting a new project binder on the shelf: once it''s labeled and indexed, every document you add to it
    is tracked.'
  hands_on_action: In ~/practice-cli, run `git init`; then `ls -la` to see the new .git folder.

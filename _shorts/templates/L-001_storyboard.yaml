lesson_id: L-001
day_number: 1
learning_title: "the command line"
lesson_title: "Open the terminal"
hook_text: "Your very first keystroke into the world of engineering."
finale_hold: 3.5

lanes:
  - "Desktop"
  - "OS Search"
  - "Terminal"

beats:
  - kind: open
    to_lane: "Desktop"
    narration: "Day one, learning the command line from scratch. Today's lesson is quick — we're using a shortcut to open our terminal and meet the command-line interface. C-L-I for short."
    min_duration: 2.0

  - kind: self
    from_lane: "Desktop"
    label: "press shortcut"
    narration: "Start at your desktop. Press the shortcut. Command plus Space on Mac, the Windows key on Windows, or Super on Linux."
    min_duration: 2.0
    input_display:
      type: keycaps
      rows:
        - platform: "Mac"
          keys: ["Cmd", "Space"]
        - platform: "Win"
          keys: ["Win"]
        - platform: "Linux"
          keys: ["Super"]

  - kind: call
    from_lane: "Desktop"
    to_lane: "OS Search"
    label: "open search"
    narration: "A search bar appears."
    min_duration: 1.2

  - kind: self
    from_lane: "OS Search"
    label: "type: terminal"
    narration: "Type the word terminal. The top result is the app."
    min_duration: 1.6
    input_display:
      type: text_input
      placeholder: "type to search..."
      text: "terminal"

  - kind: call
    from_lane: "OS Search"
    to_lane: "Terminal"
    label: "press enter"
    narration: "Press Enter to launch it."
    min_duration: 1.2
    input_display:
      type: key
      label: "Enter"

  - kind: return
    from_lane: "Terminal"
    to_lane: "Desktop"
    label: "window opens"
    narration: "That's your terminal. Blinking cursor, ready. Tomorrow, we type our first command."
    min_duration: 1.6
    input_display:
      type: command
      prompt: "$"
      text: "_"

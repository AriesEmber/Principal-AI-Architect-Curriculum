<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 592" width="1100" height="592" role="img" aria-label="macOS · install Homebrew, then confirm - Paste the installer from brew.sh. It asks for your password and pauses before acting.">
<style>.ui{font-family:-apple-system,"Segoe UI",Arial,sans-serif;}.mono{font-family:"SF Mono",Consolas,"Courier New",monospace;}</style>
<rect width="1100" height="592" fill="#0b0d12"/>
<text x="550" y="42" text-anchor="middle" class="ui" font-size="22" font-weight="700" fill="#ecf1fa">macOS · install Homebrew, then confirm</text>
<text x="550" y="66" text-anchor="middle" class="ui" font-size="14" fill="#aebcd0">Paste the installer from brew.sh. It asks for your password and pauses before acting.</text>
<rect x="40" y="100" width="1020" height="420" rx="10" ry="10" fill="#1b1b1f"/>
<rect x="40" y="100" width="1020" height="36" rx="10" ry="10" fill="#2e2e33"/>
<rect x="40" y="128" width="1020" height="8" fill="#2e2e33"/>
<circle cx="60" cy="118" r="6" fill="#ff5f57"/>
<circle cx="78" cy="118" r="6" fill="#febc2e"/>
<circle cx="96" cy="118" r="6" fill="#28c840"/>
<text x="550" y="123" text-anchor="middle" class="ui" font-size="13" fill="#d0d0d8">Terminal (bash)</text>
<text x="68.0" y="174" class="mono" font-size="18" fill="#50e8b3" xml:space="preserve">learner</text>
<text x="143.6" y="174" class="mono" font-size="18" fill="#d0d0d8" xml:space="preserve">@</text>
<text x="154.4" y="174" class="mono" font-size="18" fill="#f99e9e" xml:space="preserve">mac</text>
<text x="186.8" y="174" class="mono" font-size="18" fill="#d0d0d8" xml:space="preserve">:</text>
<text x="197.6" y="174" class="mono" font-size="18" fill="#5fa3d1" xml:space="preserve">~</text>
<text x="208.4" y="174" class="mono" font-size="18" fill="#ffd666" xml:space="preserve"> $ </text>
<text x="240.8" y="174" class="mono" font-size="18" fill="#e6edf3" xml:space="preserve">/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/</text>
<text x="68.0" y="202" class="mono" font-size="18" fill="#e6edf3" xml:space="preserve">  Homebrew/install/HEAD/install.sh)"</text>
<text x="68.0" y="230" class="mono" font-size="18" fill="#8ca0b9" xml:space="preserve">==&gt; Checking for `sudo` access (which may request your password)</text>
<text x="68.0" y="258" class="mono" font-size="18" fill="#afb9ca" xml:space="preserve">Password:</text>
<text x="68.0" y="286" class="mono" font-size="18" fill="#8ca0b9" xml:space="preserve">==&gt; This script will install:</text>
<text x="68.0" y="314" class="mono" font-size="18" fill="#8ca0b9" xml:space="preserve">  /opt/homebrew/bin/brew  (and supporting paths)</text>
<text x="68.0" y="342" class="mono" font-size="18" fill="#7ee787" xml:space="preserve">==&gt; Installation successful!</text>
<text x="68.0" y="398" class="mono" font-size="18" fill="#50e8b3" xml:space="preserve">learner</text>
<text x="143.6" y="398" class="mono" font-size="18" fill="#d0d0d8" xml:space="preserve">@</text>
<text x="154.4" y="398" class="mono" font-size="18" fill="#f99e9e" xml:space="preserve">mac</text>
<text x="186.8" y="398" class="mono" font-size="18" fill="#d0d0d8" xml:space="preserve">:</text>
<text x="197.6" y="398" class="mono" font-size="18" fill="#5fa3d1" xml:space="preserve">~</text>
<text x="208.4" y="398" class="mono" font-size="18" fill="#ffd666" xml:space="preserve"> $ </text>
<text x="240.8" y="398" class="mono" font-size="18" fill="#e6edf3" xml:space="preserve">brew --version</text>
<text x="68.0" y="426" class="mono" font-size="18" fill="#7ee787" xml:space="preserve">Homebrew 4.2.13</text>
<text x="68.0" y="482" class="mono" font-size="18" fill="#50e8b3" xml:space="preserve">learner</text>
<text x="143.6" y="482" class="mono" font-size="18" fill="#d0d0d8" xml:space="preserve">@</text>
<text x="154.4" y="482" class="mono" font-size="18" fill="#f99e9e" xml:space="preserve">mac</text>
<text x="186.8" y="482" class="mono" font-size="18" fill="#d0d0d8" xml:space="preserve">:</text>
<text x="197.6" y="482" class="mono" font-size="18" fill="#5fa3d1" xml:space="preserve">~</text>
<text x="208.4" y="482" class="mono" font-size="18" fill="#ffd666" xml:space="preserve"> $ </text>
<rect x="40" y="544" width="1020" height="36" fill="#141923"/>
<text x="550" y="568" text-anchor="middle" class="ui" font-size="13" fill="#9aa3b2">macOS installs Homebrew from its official script. The installer asks for your password and pauses before acting.</text>
</svg>
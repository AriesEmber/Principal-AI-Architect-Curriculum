<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 850" width="1400" height="850" font-family="'SF Mono','Fira Code','Consolas',monospace">
<defs><linearGradient id="bashbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b2029"/><stop offset="1" stop-color="#12161d"/></linearGradient><linearGradient id="psbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#012456"/><stop offset="1" stop-color="#011736"/></linearGradient></defs>
<rect width="1400" height="850" fill="#0b0d12"/>
<text x="700" y="32" text-anchor="middle" fill="#cdd5e0" font-size="18" font-weight="600">L-008 · read a file with cat and a pager — PowerShell + Bash</text>
<rect x="20" y="70" width="670" height="720" rx="12" ry="12" fill="url(#psbg)" stroke="#1c4d8c" stroke-width="1.5"/>
<rect x="20" y="70" width="670" height="40" rx="12" ry="12" fill="#0a3a73"/>
<rect x="20" y="100" width="670" height="10" fill="#0a3a73"/>
<circle cx="42" cy="90" r="7" fill="#ff5f57"/>
<circle cx="62" cy="90" r="7" fill="#febc2e"/>
<circle cx="82" cy="90" r="7" fill="#28c840"/>
<text x="355" y="96" text-anchor="middle" fill="#cfd9ee" font-size="13">PowerShell · Windows</text>
<rect x="21" y="734" width="668" height="55" fill="#031a3a"/>
<text x="36" y="754" fill="#cfd9ee" font-size="13">PowerShell: cat is an alias for Get-Content. Short files dump. more.com pages longer files</text>
<text x="36" y="772" fill="#cfd9ee" font-size="13">with a -- More -- prompt.</text>
<rect x="710" y="70" width="670" height="720" rx="12" ry="12" fill="url(#bashbg)" stroke="#2a3140" stroke-width="1.5"/>
<rect x="710" y="70" width="670" height="40" rx="12" ry="12" fill="#262c38"/>
<rect x="710" y="100" width="670" height="10" fill="#262c38"/>
<circle cx="732" cy="90" r="7" fill="#ff5f57"/>
<circle cx="752" cy="90" r="7" fill="#febc2e"/>
<circle cx="772" cy="90" r="7" fill="#28c840"/>
<text x="1045" y="96" text-anchor="middle" fill="#9aa3b2" font-size="13">Bash · macOS / Linux / WSL</text>
<rect x="711" y="734" width="668" height="55" fill="#141923"/>
<text x="726" y="754" fill="#9aa3b2" font-size="13">Bash: cat writes to stdout. less is an interactive pager that shows a colon prompt; press q</text>
<text x="726" y="772" fill="#9aa3b2" font-size="13">to quit, space for the next page.</text>
<g font-size="16" xml:space="preserve">
<text x="42" y="146" fill="#cfd9ee">PS </text>
<text x="71" y="146" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="146" fill="#cfd9ee">&gt; </text>
<text x="244" y="146" fill="#ffab70">"one","two","three"</text>
<text x="426" y="146" fill="#ffffff"> &gt; </text>
<text x="455" y="146" fill="#ffab70">notes.txt</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 962" width="1400" height="962" font-family="'SF Mono','Fira Code','Consolas',monospace">
<defs><linearGradient id="bashbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b2029"/><stop offset="1" stop-color="#12161d"/></linearGradient><linearGradient id="psbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#012456"/><stop offset="1" stop-color="#011736"/></linearGradient></defs>
<rect width="1400" height="962" fill="#0b0d12"/>
<text x="700" y="32" text-anchor="middle" fill="#cdd5e0" font-size="18" font-weight="600">L-009 · edit a file with nano — PowerShell + Bash</text>
<rect x="20" y="70" width="670" height="832" rx="12" ry="12" fill="url(#psbg)" stroke="#1c4d8c" stroke-width="1.5"/>
<rect x="20" y="70" width="670" height="40" rx="12" ry="12" fill="#0a3a73"/>
<rect x="20" y="100" width="670" height="10" fill="#0a3a73"/>
<circle cx="42" cy="90" r="7" fill="#ff5f57"/>
<circle cx="62" cy="90" r="7" fill="#febc2e"/>
<circle cx="82" cy="90" r="7" fill="#28c840"/>
<text x="355" y="96" text-anchor="middle" fill="#cfd9ee" font-size="13">PowerShell · Windows</text>
<rect x="21" y="846" width="668" height="55" fill="#031a3a"/>
<text x="36" y="866" fill="#cfd9ee" font-size="13">PowerShell (Windows 11): nano is not built in. Run winget install GNU.Nano once; after that</text>
<text x="36" y="884" fill="#cfd9ee" font-size="13">the keystrokes match Bash exactly.</text>
<rect x="710" y="70" width="670" height="832" rx="12" ry="12" fill="url(#bashbg)" stroke="#2a3140" stroke-width="1.5"/>
<rect x="710" y="70" width="670" height="40" rx="12" ry="12" fill="#262c38"/>
<rect x="710" y="100" width="670" height="10" fill="#262c38"/>
<circle cx="732" cy="90" r="7" fill="#ff5f57"/>
<circle cx="752" cy="90" r="7" fill="#febc2e"/>
<circle cx="772" cy="90" r="7" fill="#28c840"/>
<text x="1045" y="96" text-anchor="middle" fill="#9aa3b2" font-size="13">Bash · macOS / Linux / WSL</text>
<rect x="711" y="846" width="668" height="55" fill="#141923"/>
<text x="726" y="866" fill="#9aa3b2" font-size="13">Bash (macOS, Linux, WSL): nano ships with the OS. Ctrl+O writes the file, Ctrl+X exits,</text>
<text x="726" y="884" fill="#9aa3b2" font-size="13">Ctrl+W searches. The caret means Ctrl.</text>
<g font-size="16" xml:space="preserve">
<text x="42" y="146" fill="#cfd9ee">PS </text>
<text x="71" y="146" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="146" fill="#cfd9ee">&gt; </text>
<text x="244" y="146" fill="#ffffff">nano </text>
<text x="292" y="146" fill="#ffab70">hello.txt</text>
<text x="42" y="174" fill="#cfd9ee">GNU nano 7.2      hello.txt          [ New File ]</text>
<text x="42" y="202" fill="#8b94a5"></text>
<text x="42" y="230" fill="#8b94a5"></text>
<text x="42" y="258" fill="#ffd278">^O Write Out   ^X Exit   ^W Where Is   ^G Help</text>
<text x="42" y="286" fill="#cfd9ee">PS </text>
<text x="71" y="286" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="286" fill="#cfd9ee">&gt; </text>
<text x="244" y="286" fill="#8b94a5">(type three lines)</text>
<text x="42" y="314" fill="#cfd9ee">GNU nano 7.2      hello.txt          Modified</text>
<text x="42" y="342" fill="#7ee787">hello from nano</text>
<text x="42" y="370" fill="#7ee787">this is line two</text>
<text x="42" y="398" fill="#7ee787">good night</text>
<text x="42" y="426" fill="#ffd278">^O Write Out   ^X Exit   ^W Where Is</text>
<text x="42" y="454" fill="#cfd9ee">PS </text>
<text x="71" y="454" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="454" fill="#cfd9ee">&gt; </text>
<text x="244" y="454" fill="#ffffff">^O</text>
<text x="42" y="482" fill="#cfd9ee">GNU nano 7.2      hello.txt          Modified</text>
<text x="42" y="510" fill="#7ee787">hello from nano</text>
<text x="42" y="538" fill="#7ee787">this is line two</text>
<text x="42" y="566" fill="#7ee787">good night</text>
<text x="42" y="594" fill="#ffd278">File Name to Write: hello.txt</text>
<text x="42" y="622" fill="#cfd9ee">PS </text>
<text x="71" y="622" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="622" fill="#cfd9ee">&gt; </text>
<text x="244" y="622" fill="#ffffff">&lt;Enter&gt;  ^X</text>
<text x="42" y="650" fill="#7ee787">[ Wrote 3 lines ]</text>
<text x="42" y="678" fill="#8b94a5">(nano closes, shell prompt returns)</text>
<text x="42" y="706" fill="#cfd9ee">PS </text>
<text x="71" y="706" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="706" fill="#cfd9ee">&gt; </text>
<text x="244" y="706" fill="#ffffff">cat </text>
<text x="282" y="706" fill="#ffab70">hello.txt</text>
<text x="42" y="734" fill="#7ee787">hello from nano</text>
<text x="42" y="762" fill="#7ee787">this is line two</text>
<text x="42" y="790" fill="#7ee787">good night</text>
<text x="42" y="818" fill="#cfd9ee">PS </text>
<text x="71" y="818" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="818" fill="#cfd9ee">&gt; </text>
<rect x="245" y="803" width="11" height="20" fill="#ffffff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
<text x="732" y="146" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="146" fill="#7e8697">:</text>
<text x="876" y="146" fill="#c792ea">~</text>
<text x="886" y="146" fill="#7e8697">$ </text>
<text x="905" y="146" fill="#e6edf3">nano </text>
<text x="953" y="146" fill="#ffab70">hello.txt</text>
<text x="732" y="174" fill="#cfd9ee">GNU nano 7.2      hello.txt          [ New File ]</text>
<text x="732" y="202" fill="#8b94a5"></text>
<text x="732" y="230" fill="#8b94a5"></text>
<text x="732" y="258" fill="#ffd278">^O Write Out   ^X Exit   ^W Where Is   ^G Help</text>
<text x="732" y="286" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="286" fill="#7e8697">:</text>
<text x="876" y="286" fill="#c792ea">~</text>
<text x="886" y="286" fill="#7e8697">$ </text>
<text x="905" y="286" fill="#8b94a5">(type three lines)</text>
<text x="732" y="314" fill="#cfd9ee">GNU nano 7.2      hello.txt          Modified</text>
<text x="732" y="342" fill="#7ee787">hello from nano</text>
<text x="732" y="370" fill="#7ee787">this is line two</text>
<text x="732" y="398" fill="#7ee787">good night</text>
<text x="732" y="426" fill="#ffd278">^O Write Out   ^X Exit   ^W Where Is</text>
<text x="732" y="454" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="454" fill="#7e8697">:</text>
<text x="876" y="454" fill="#c792ea">~</text>
<text x="886" y="454" fill="#7e8697">$ </text>
<text x="905" y="454" fill="#e6edf3">^O</text>
<text x="732" y="482" fill="#cfd9ee">GNU nano 7.2      hello.txt          Modified</text>
<text x="732" y="510" fill="#7ee787">hello from nano</text>
<text x="732" y="538" fill="#7ee787">this is line two</text>
<text x="732" y="566" fill="#7ee787">good night</text>
<text x="732" y="594" fill="#ffd278">File Name to Write: hello.txt</text>
<text x="732" y="622" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="622" fill="#7e8697">:</text>
<text x="876" y="622" fill="#c792ea">~</text>
<text x="886" y="622" fill="#7e8697">$ </text>
<text x="905" y="622" fill="#e6edf3">&lt;Enter&gt;  ^X</text>
<text x="732" y="650" fill="#7ee787">[ Wrote 3 lines ]</text>
<text x="732" y="678" fill="#8b94a5">(nano closes, shell prompt returns)</text>
<text x="732" y="706" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="706" fill="#7e8697">:</text>
<text x="876" y="706" fill="#c792ea">~</text>
<text x="886" y="706" fill="#7e8697">$ </text>
<text x="905" y="706" fill="#e6edf3">cat </text>
<text x="943" y="706" fill="#ffab70">hello.txt</text>
<text x="732" y="734" fill="#7ee787">hello from nano</text>
<text x="732" y="762" fill="#7ee787">this is line two</text>
<text x="732" y="790" fill="#7ee787">good night</text>

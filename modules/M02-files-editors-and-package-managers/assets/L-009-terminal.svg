<text x="866" y="818" fill="#7e8697">:</text>
<text x="876" y="818" fill="#c792ea">~</text>
<text x="886" y="818" fill="#7e8697">$ </text>
<rect x="906" y="803" width="11" height="20" fill="#e6edf3"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
</g>
<g font-size="13" fill="#8b94a5">
<text x="674" y="146" text-anchor="end">1. Open nano</text>
<text x="1364" y="146" text-anchor="end">1. Open nano</text>
<text x="674" y="286" text-anchor="end">2. Type three lines</text>
<text x="1364" y="286" text-anchor="end">2. Type three lines</text>
<text x="674" y="454" text-anchor="end">3. Save with Ctrl+O</text>
<text x="1364" y="454" text-anchor="end">3. Save with Ctrl+O</text>
<text x="674" y="622" text-anchor="end">4. Enter, then Ctrl+X</text>
<text x="1364" y="622" text-anchor="end">4. Enter, then Ctrl+X</text>
<text x="674" y="706" text-anchor="end">5. Verify with cat</text>
<text x="1364" y="706" text-anchor="end">5. Verify with cat</text>
</g>
<rect x="20" y="922" width="1360" height="34" fill="#141923"/>
<text x="700" y="946" text-anchor="middle" fill="#9aa3b2" font-size="14">Five exchanges. Open nano on hello.txt, type three lines, save with Ctrl+O and Enter, quit with Ctrl+X, then read the file back with cat. Nano itself is the same program in both shells; install on Windows with winget install GNU.Nano once.</text>
</svg>
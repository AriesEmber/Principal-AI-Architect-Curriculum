<text x="1364" y="202" text-anchor="end">2. Install tree</text>
<text x="674" y="342" text-anchor="end">3. Verify the command</text>
<text x="1364" y="342" text-anchor="end">3. Verify the command</text>
<text x="674" y="454" text-anchor="end">4. Make a folder</text>
<text x="1364" y="454" text-anchor="end">4. Make a folder</text>

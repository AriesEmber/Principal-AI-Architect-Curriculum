<rect x="20" y="894" width="1360" height="34" fill="#141923"/>
<text x="700" y="918" text-anchor="middle" fill="#9aa3b2" font-size="14">Six exchanges. Confirm the package manager, install tree, verify the new command, build a sample folder, and run tree on it. On Windows the new binary is tree.exe; tree.com in System32 still wins the PATH lookup for the bare name.</text>

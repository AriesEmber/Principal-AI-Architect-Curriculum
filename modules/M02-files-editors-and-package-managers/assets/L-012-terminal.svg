<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 934" width="1400" height="934" font-family="'SF Mono','Fira Code','Consolas',monospace">
<defs><linearGradient id="bashbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b2029"/><stop offset="1" stop-color="#12161d"/></linearGradient><linearGradient id="psbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#012456"/><stop offset="1" stop-color="#011736"/></linearGradient></defs>
<rect width="1400" height="934" fill="#0b0d12"/>
<text x="700" y="32" text-anchor="middle" fill="#cdd5e0" font-size="18" font-weight="600">L-012 · install your first tool with a package manager — PowerShell + Bash</text>
<rect x="20" y="70" width="670" height="804" rx="12" ry="12" fill="url(#psbg)" stroke="#1c4d8c" stroke-width="1.5"/>
<rect x="20" y="70" width="670" height="40" rx="12" ry="12" fill="#0a3a73"/>
<rect x="20" y="100" width="670" height="10" fill="#0a3a73"/>
<circle cx="42" cy="90" r="7" fill="#ff5f57"/>
<circle cx="62" cy="90" r="7" fill="#febc2e"/>
<circle cx="82" cy="90" r="7" fill="#28c840"/>
<text x="355" y="96" text-anchor="middle" fill="#cfd9ee" font-size="13">PowerShell · Windows</text>
<rect x="21" y="818" width="668" height="55" fill="#031a3a"/>
<text x="36" y="838" fill="#cfd9ee" font-size="13">PowerShell (Windows 11): winget installs GnuWin32.Tree next to the built-in tree.com.</text>
<text x="36" y="856" fill="#cfd9ee" font-size="13">Invoke the new one as tree.exe; open a fresh PowerShell window first so PATH refreshes.</text>
<rect x="710" y="70" width="670" height="804" rx="12" ry="12" fill="url(#bashbg)" stroke="#2a3140" stroke-width="1.5"/>
<rect x="710" y="70" width="670" height="40" rx="12" ry="12" fill="#262c38"/>
<rect x="710" y="100" width="670" height="10" fill="#262c38"/>
<circle cx="732" cy="90" r="7" fill="#ff5f57"/>
<circle cx="752" cy="90" r="7" fill="#febc2e"/>
<circle cx="772" cy="90" r="7" fill="#28c840"/>
<text x="1045" y="96" text-anchor="middle" fill="#9aa3b2" font-size="13">Bash · macOS / Linux / WSL</text>
<rect x="711" y="818" width="668" height="55" fill="#141923"/>
<text x="726" y="838" fill="#9aa3b2" font-size="13">Bash (macOS): brew install tree. On Debian/Ubuntu/WSL run sudo apt install tree instead;</text>
<text x="726" y="856" fill="#9aa3b2" font-size="13">the run command is the same.</text>
<g font-size="16" xml:space="preserve">
<text x="42" y="146" fill="#cfd9ee">PS </text>
<text x="71" y="146" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="146" fill="#cfd9ee">&gt; </text>
<text x="244" y="146" fill="#ffffff">winget --version</text>
<text x="42" y="174" fill="#7ee787">v1.10.320</text>
<text x="42" y="202" fill="#cfd9ee">PS </text>
<text x="71" y="202" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="202" fill="#cfd9ee">&gt; </text>
<text x="244" y="202" fill="#ffffff">winget install </text>
<text x="388" y="202" fill="#ffab70">-e --id GnuWin32.Tree</text>
<text x="42" y="230" fill="#8b94a5">Found GnuWin32: Tree [GnuWin32.Tree] v1.7.0.4</text>
<text x="42" y="258" fill="#8b94a5">Downloading and verifying installer...</text>
<text x="42" y="286" fill="#7ee787">Successfully installed</text>
<text x="42" y="314" fill="#8b94a5">(open a new PowerShell window to refresh PATH)</text>
<text x="42" y="342" fill="#cfd9ee">PS </text>
<text x="71" y="342" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="342" fill="#cfd9ee">&gt; </text>
<text x="244" y="342" fill="#ffffff">tree.exe --version</text>
<text x="42" y="370" fill="#7ee787">tree v1.7.0 (c) 1996 - 2014 by Steve Baker,</text>
<text x="42" y="398" fill="#7ee787">Thomas Moore, Francesc Rocher, and others.</text>
<text x="42" y="426" fill="#8b94a5">(tree.exe = GnuWin32; tree alone still runs tree.com)</text>
<text x="42" y="454" fill="#cfd9ee">PS </text>
<text x="71" y="454" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="454" fill="#cfd9ee">&gt; </text>
<text x="244" y="454" fill="#ffffff">mkdir </text>
<text x="302" y="454" fill="#ffab70">practice-cli\src</text>
<text x="42" y="482" fill="#8b94a5">    Directory: C:\Users\learner</text>
<text x="42" y="510" fill="#7ee787">d----  practice-cli</text>
<text x="42" y="538" fill="#8b94a5">(subfolder src created too)</text>
<text x="42" y="566" fill="#cfd9ee">PS </text>
<text x="71" y="566" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="566" fill="#cfd9ee">&gt; </text>
<text x="244" y="566" fill="#ffab70">"hi"</text>
<text x="282" y="566" fill="#ffffff"> &gt; </text>
<text x="311" y="566" fill="#ffab70">practice-cli\README.md</text>
<text x="42" y="594" fill="#8b94a5">(file written; no output)</text>
<text x="42" y="622" fill="#cfd9ee">PS </text>
<text x="71" y="622" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="622" fill="#cfd9ee">&gt; </text>
<text x="244" y="622" fill="#ffffff">tree.exe </text>
<text x="330" y="622" fill="#ffab70">practice-cli</text>
<text x="42" y="650" fill="#7ee787">practice-cli</text>
<text x="42" y="678" fill="#7ee787">|-- README.md</text>
<text x="42" y="706" fill="#7ee787">`-- src</text>
<text x="42" y="734" fill="#8b94a5"></text>
<text x="42" y="762" fill="#8b94a5">1 directory, 1 file</text>
<text x="42" y="790" fill="#cfd9ee">PS </text>
<text x="71" y="790" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="790" fill="#cfd9ee">&gt; </text>
<rect x="245" y="775" width="11" height="20" fill="#ffffff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
<text x="732" y="146" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="146" fill="#7e8697">:</text>
<text x="876" y="146" fill="#c792ea">~</text>
<text x="886" y="146" fill="#7e8697">$ </text>
<text x="905" y="146" fill="#e6edf3">brew --version</text>
<text x="732" y="174" fill="#7ee787">Homebrew 4.2.13</text>
<text x="732" y="202" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="202" fill="#7e8697">:</text>
<text x="876" y="202" fill="#c792ea">~</text>
<text x="886" y="202" fill="#7e8697">$ </text>
<text x="905" y="202" fill="#e6edf3">brew install </text>
<text x="1030" y="202" fill="#ffab70">tree</text>
<text x="732" y="230" fill="#8b94a5">==&gt; Fetching tree</text>
<text x="732" y="258" fill="#8b94a5">==&gt; Pouring tree--2.2.1.arm64.bottle.tar.gz</text>
<text x="732" y="286" fill="#7ee787">/opt/homebrew/Cellar/tree/2.2.1: 8 files</text>
<text x="732" y="314" fill="#8b94a5">(command tree is now on your PATH)</text>
<text x="732" y="342" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="342" fill="#7e8697">:</text>
<text x="876" y="342" fill="#c792ea">~</text>
<text x="886" y="342" fill="#7e8697">$ </text>
<text x="905" y="342" fill="#e6edf3">tree --version</text>
<text x="732" y="370" fill="#7ee787">tree v2.2.1 (c) 1996 - 2024 by Steve Baker,</text>
<text x="732" y="398" fill="#7ee787">Thomas Moore, Francesc Rocher, Florian Sesser</text>
<text x="732" y="426" fill="#8b94a5">(the new command is on PATH after the install)</text>
<text x="732" y="454" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="454" fill="#7e8697">:</text>
<text x="876" y="454" fill="#c792ea">~</text>
<text x="886" y="454" fill="#7e8697">$ </text>
<text x="905" y="454" fill="#e6edf3">mkdir -p </text>
<text x="991" y="454" fill="#ffab70">practice-cli/src</text>
<text x="732" y="482" fill="#8b94a5">(both folders created; no output)</text>
<text x="732" y="566" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="566" fill="#7e8697">:</text>
<text x="876" y="566" fill="#c792ea">~</text>
<text x="886" y="566" fill="#7e8697">$ </text>
<text x="905" y="566" fill="#e6edf3">echo hi</text>
<text x="972" y="566" fill="#e6edf3"> &gt; </text>
<text x="1001" y="566" fill="#ffab70">practice-cli/README.md</text>
<text x="732" y="594" fill="#8b94a5">(file written; no output)</text>
<text x="732" y="622" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="622" fill="#7e8697">:</text>
<text x="876" y="622" fill="#c792ea">~</text>
<text x="886" y="622" fill="#7e8697">$ </text>
<text x="905" y="622" fill="#e6edf3">tree </text>
<text x="953" y="622" fill="#ffab70">practice-cli</text>
<text x="732" y="650" fill="#7ee787">practice-cli</text>
<text x="732" y="678" fill="#7ee787">├── README.md</text>
<text x="732" y="706" fill="#7ee787">└── src</text>

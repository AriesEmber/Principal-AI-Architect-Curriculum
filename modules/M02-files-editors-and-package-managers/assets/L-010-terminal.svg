<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 934" width="1400" height="934" font-family="'SF Mono','Fira Code','Consolas',monospace">
<defs><linearGradient id="bashbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b2029"/><stop offset="1" stop-color="#12161d"/></linearGradient><linearGradient id="psbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#012456"/><stop offset="1" stop-color="#011736"/></linearGradient></defs>
<rect width="1400" height="934" fill="#0b0d12"/>
<text x="700" y="32" text-anchor="middle" fill="#cdd5e0" font-size="18" font-weight="600">L-010 · file paths, extensions, and hidden files — PowerShell + Bash</text>
<rect x="20" y="70" width="670" height="804" rx="12" ry="12" fill="url(#psbg)" stroke="#1c4d8c" stroke-width="1.5"/>
<rect x="20" y="70" width="670" height="40" rx="12" ry="12" fill="#0a3a73"/>
<rect x="20" y="100" width="670" height="10" fill="#0a3a73"/>
<circle cx="42" cy="90" r="7" fill="#ff5f57"/>
<circle cx="62" cy="90" r="7" fill="#febc2e"/>
<circle cx="82" cy="90" r="7" fill="#28c840"/>
<text x="355" y="96" text-anchor="middle" fill="#cfd9ee" font-size="13">PowerShell · Windows</text>
<rect x="21" y="818" width="668" height="55" fill="#031a3a"/>
<text x="36" y="838" fill="#cfd9ee" font-size="13">PowerShell (Windows 11): Get-Location prints the absolute path. Dotfiles show by default;</text>
<text x="36" y="856" fill="#cfd9ee" font-size="13">Get-ChildItem -Force adds files with the Windows Hidden attribute.</text>
<rect x="710" y="70" width="670" height="804" rx="12" ry="12" fill="url(#bashbg)" stroke="#2a3140" stroke-width="1.5"/>
<rect x="710" y="70" width="670" height="40" rx="12" ry="12" fill="#262c38"/>
<rect x="710" y="100" width="670" height="10" fill="#262c38"/>
<circle cx="732" cy="90" r="7" fill="#ff5f57"/>
<circle cx="752" cy="90" r="7" fill="#febc2e"/>
<circle cx="772" cy="90" r="7" fill="#28c840"/>
<text x="1045" y="96" text-anchor="middle" fill="#9aa3b2" font-size="13">Bash · macOS / Linux / WSL</text>
<rect x="711" y="818" width="668" height="55" fill="#141923"/>
<text x="726" y="838" fill="#9aa3b2" font-size="13">Bash (macOS, Linux, WSL): pwd prints the absolute path. Files starting with a dot are</text>
<text x="726" y="856" fill="#9aa3b2" font-size="13">hidden from ls until -a; ls -la also shows owner, size, and modified time.</text>
<g font-size="16" xml:space="preserve">
<text x="42" y="146" fill="#cfd9ee">PS </text>
<text x="71" y="146" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="146" fill="#cfd9ee">&gt; </text>
<text x="244" y="146" fill="#ffffff">Get-Location</text>
<text x="42" y="174" fill="#8b94a5">Path</text>
<text x="42" y="202" fill="#8b94a5">----</text>
<text x="42" y="230" fill="#7ee787">C:\Users\learner</text>
<text x="42" y="258" fill="#cfd9ee">PS </text>
<text x="71" y="258" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="258" fill="#cfd9ee">&gt; </text>
<text x="244" y="258" fill="#ffab70">"hello paths"</text>
<text x="369" y="258" fill="#ffffff"> &gt; </text>
<text x="398" y="258" fill="#ffab70">note.txt</text>
<text x="42" y="286" fill="#8b94a5">(file written; no output)</text>
<text x="42" y="314" fill="#cfd9ee">PS </text>
<text x="71" y="314" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="314" fill="#cfd9ee">&gt; </text>
<text x="244" y="314" fill="#ffffff">cat </text>
<text x="282" y="314" fill="#ffab70">note.txt</text>
<text x="42" y="342" fill="#7ee787">hello paths</text>
<text x="42" y="370" fill="#cfd9ee">PS </text>
<text x="71" y="370" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="370" fill="#cfd9ee">&gt; </text>
<text x="244" y="370" fill="#ffffff">cat </text>
<text x="282" y="370" fill="#ffab70">C:\Users\learner\note.txt</text>
<text x="42" y="398" fill="#7ee787">hello paths</text>
<text x="42" y="426" fill="#8b94a5">(same file, longer address)</text>
<text x="42" y="454" fill="#cfd9ee">PS </text>
<text x="71" y="454" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="454" fill="#cfd9ee">&gt; </text>
<text x="244" y="454" fill="#ffffff">Rename-Item </text>
<text x="359" y="454" fill="#ffab70">note.txt</text>
<text x="436" y="454" fill="#ffffff"> </text>
<text x="446" y="454" fill="#ffab70">note.md</text>
<text x="42" y="482" fill="#8b94a5">(renamed; no output)</text>
<text x="42" y="510" fill="#cfd9ee">PS </text>
<text x="71" y="510" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="510" fill="#cfd9ee">&gt; </text>
<text x="244" y="510" fill="#ffffff">cat </text>
<text x="282" y="510" fill="#ffab70">note.md</text>
<text x="42" y="538" fill="#7ee787">hello paths</text>
<text x="42" y="566" fill="#8b94a5">(extension is a label, not a lock)</text>
<text x="42" y="594" fill="#cfd9ee">PS </text>
<text x="71" y="594" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="594" fill="#cfd9ee">&gt; </text>
<text x="244" y="594" fill="#ffffff">Get-ChildItem </text>
<text x="378" y="594" fill="#ffab70">-Force</text>
<text x="42" y="622" fill="#8b94a5">Name</text>
<text x="42" y="650" fill="#8b94a5">----</text>
<text x="42" y="678" fill="#7ee787">.gitconfig</text>
<text x="42" y="706" fill="#7ee787">.ssh</text>
<text x="42" y="734" fill="#7ee787">note.md</text>
<text x="42" y="762" fill="#8b94a5">(dotfiles shown by default; -Force adds Hidden-attribute)</text>
<text x="42" y="790" fill="#cfd9ee">PS </text>
<text x="71" y="790" fill="#9bb4dd">C:\Users\learner</text>
<text x="225" y="790" fill="#cfd9ee">&gt; </text>
<rect x="245" y="775" width="11" height="20" fill="#ffffff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
<text x="732" y="146" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="146" fill="#7e8697">:</text>
<text x="876" y="146" fill="#c792ea">~</text>
<text x="886" y="146" fill="#7e8697">$ </text>
<text x="905" y="146" fill="#e6edf3">pwd</text>
<text x="732" y="174" fill="#7ee787">/home/learner</text>
<text x="732" y="258" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="258" fill="#7e8697">:</text>
<text x="876" y="258" fill="#c792ea">~</text>
<text x="886" y="258" fill="#7e8697">$ </text>
<text x="905" y="258" fill="#e6edf3">echo </text>
<text x="953" y="258" fill="#ffab70">"hello paths"</text>
<text x="1078" y="258" fill="#e6edf3"> &gt; </text>
<text x="1107" y="258" fill="#ffab70">note.txt</text>
<text x="732" y="286" fill="#8b94a5">(file written; no output)</text>
<text x="732" y="314" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="314" fill="#7e8697">:</text>
<text x="876" y="314" fill="#c792ea">~</text>
<text x="886" y="314" fill="#7e8697">$ </text>
<text x="905" y="314" fill="#e6edf3">cat </text>
<text x="943" y="314" fill="#ffab70">note.txt</text>
<text x="732" y="342" fill="#7ee787">hello paths</text>
<text x="732" y="370" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="370" fill="#7e8697">:</text>
<text x="876" y="370" fill="#c792ea">~</text>
<text x="886" y="370" fill="#7e8697">$ </text>
<text x="905" y="370" fill="#e6edf3">cat </text>
<text x="943" y="370" fill="#ffab70">/home/learner/note.txt</text>
<text x="732" y="398" fill="#7ee787">hello paths</text>
<text x="732" y="426" fill="#8b94a5">(same file, longer address)</text>
<text x="732" y="454" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="454" fill="#7e8697">:</text>
<text x="876" y="454" fill="#c792ea">~</text>
<text x="886" y="454" fill="#7e8697">$ </text>
<text x="905" y="454" fill="#e6edf3">mv </text>
<text x="934" y="454" fill="#ffab70">note.txt</text>
<text x="1011" y="454" fill="#e6edf3"> </text>
<text x="1021" y="454" fill="#ffab70">note.md</text>
<text x="732" y="482" fill="#8b94a5">(renamed; no output)</text>
<text x="732" y="510" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="510" fill="#7e8697">:</text>
<text x="876" y="510" fill="#c792ea">~</text>
<text x="886" y="510" fill="#7e8697">$ </text>
<text x="905" y="510" fill="#e6edf3">cat </text>
<text x="943" y="510" fill="#ffab70">note.md</text>
<text x="732" y="538" fill="#7ee787">hello paths</text>
<text x="732" y="566" fill="#8b94a5">(extension is a label, not a lock)</text>
<text x="732" y="594" fill="#6aa7ff">learner@laptop</text>
<text x="866" y="594" fill="#7e8697">:</text>
<text x="876" y="594" fill="#c792ea">~</text>
<text x="886" y="594" fill="#7e8697">$ </text>
<text x="905" y="594" fill="#e6edf3">ls </text>
<text x="934" y="594" fill="#ffab70">-a</text>
<text x="732" y="622" fill="#7ee787">.        ..</text>
<text x="732" y="650" fill="#7ee787">.bashrc  .gitconfig</text>
<text x="732" y="678" fill="#7ee787">.ssh     note.md</text>
<text x="732" y="706" fill="#8b94a5"></text>
<text x="732" y="734" fill="#8b94a5">(-a reveals any name starting with a dot)</text>

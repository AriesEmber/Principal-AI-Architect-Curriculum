<rect x="20" y="894" width="1360" height="34" fill="#141923"/>
<text x="700" y="918" text-anchor="middle" fill="#9aa3b2" font-size="14">Seven exchanges. Print the home path, write a file, read it two ways (relative and absolute), rename its extension, read it back, then create a dotfile and reveal it. PowerShell shows dotfiles by default; Bash hides them until ls -a.</text>

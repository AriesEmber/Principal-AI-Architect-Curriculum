<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 514" width="1400" height="514" font-family="'SF Mono','Fira Code','Consolas',monospace">
<defs><linearGradient id="bashbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b2029"/><stop offset="1" stop-color="#12161d"/></linearGradient><linearGradient id="psbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#012456"/><stop offset="1" stop-color="#011736"/></linearGradient></defs>
<rect width="1400" height="514" fill="#0b0d12"/>
<text x="700" y="32" text-anchor="middle" fill="#cdd5e0" font-size="18" font-weight="600">L-004 · pwd · where am I, in two shells</text>
<rect x="20" y="70" width="670" height="384" rx="12" ry="12" fill="url(#bashbg)" stroke="#2a3140" stroke-width="1.5"/>
<rect x="20" y="70" width="670" height="40" rx="12" ry="12" fill="#262c38"/>
<rect x="20" y="100" width="670" height="10" fill="#262c38"/>
<circle cx="42" cy="90" r="7" fill="#ff5f57"/>
<circle cx="62" cy="90" r="7" fill="#febc2e"/>
<circle cx="82" cy="90" r="7" fill="#28c840"/>
<text x="355" y="96" text-anchor="middle" fill="#9aa3b2" font-size="13">Bash · macOS / Linux / WSL</text>
<rect x="21" y="398" width="668" height="55" fill="#141923"/>
<text x="36" y="418" fill="#9aa3b2" font-size="13">pwd is built into Bash and Zsh. -L prints the logical path, -P resolves symbolic links.</text>
<rect x="710" y="70" width="670" height="384" rx="12" ry="12" fill="url(#psbg)" stroke="#1c4d8c" stroke-width="1.5"/>
<rect x="710" y="70" width="670" height="40" rx="12" ry="12" fill="#0a3a73"/>
<rect x="710" y="100" width="670" height="10" fill="#0a3a73"/>
<circle cx="732" cy="90" r="7" fill="#ff5f57"/>
<circle cx="752" cy="90" r="7" fill="#febc2e"/>
<circle cx="772" cy="90" r="7" fill="#28c840"/>
<text x="1045" y="96" text-anchor="middle" fill="#cfd9ee" font-size="13">PowerShell · Windows</text>
<rect x="711" y="398" width="668" height="55" fill="#031a3a"/>
<text x="726" y="418" fill="#cfd9ee" font-size="13">pwd is an alias for Get-Location. $PWD holds the current location object. Both print the</text>
<text x="726" y="436" fill="#cfd9ee" font-size="13">same path.</text>
<g font-size="16" xml:space="preserve">
<text x="42" y="146" fill="#6aa7ff">learner@laptop</text>
<text x="176" y="146" fill="#7e8697">:</text>
<text x="186" y="146" fill="#c792ea">~</text>
<text x="196" y="146" fill="#7e8697">$ </text>
<text x="215" y="146" fill="#e6edf3">pwd</text>
<text x="42" y="174" fill="#7ee787">/home/learner</text>
<text x="42" y="202" fill="#6aa7ff">learner@laptop</text>
<text x="176" y="202" fill="#7e8697">:</text>
<text x="186" y="202" fill="#c792ea">~</text>
<text x="196" y="202" fill="#7e8697">$ </text>
<text x="215" y="202" fill="#e6edf3">pwd -L</text>
<text x="42" y="230" fill="#7ee787">/home/learner</text>
<text x="42" y="258" fill="#6aa7ff">learner@laptop</text>
<text x="176" y="258" fill="#7e8697">:</text>
<text x="186" y="258" fill="#c792ea">~</text>
<text x="196" y="258" fill="#7e8697">$ </text>
<text x="215" y="258" fill="#e6edf3">type pwd</text>
<text x="42" y="286" fill="#7ee787">pwd is a shell builtin</text>
<text x="42" y="314" fill="#6aa7ff">learner@laptop</text>
<text x="176" y="314" fill="#7e8697">:</text>
<text x="186" y="314" fill="#c792ea">~</text>
<text x="196" y="314" fill="#7e8697">$ </text>
<text x="215" y="314" fill="#e6edf3">pwd</text>
<text x="42" y="342" fill="#7ee787">/home/learner</text>
<text x="42" y="370" fill="#6aa7ff">learner@laptop</text>
<text x="176" y="370" fill="#7e8697">:</text>
<text x="186" y="370" fill="#c792ea">~</text>
<text x="196" y="370" fill="#7e8697">$ </text>
<rect x="216" y="355" width="11" height="20" fill="#e6edf3"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
<text x="732" y="146" fill="#cfd9ee">PS </text>
<text x="761" y="146" fill="#9bb4dd">C:\Users\learner</text>
<text x="915" y="146" fill="#cfd9ee">&gt; </text>
<text x="934" y="146" fill="#ffffff">pwd</text>
<text x="732" y="174" fill="#7ee787">C:\Users\learner</text>
<text x="732" y="202" fill="#cfd9ee">PS </text>
<text x="761" y="202" fill="#9bb4dd">C:\Users\learner</text>
<text x="915" y="202" fill="#cfd9ee">&gt; </text>
<text x="934" y="202" fill="#ffffff">Get-Location</text>
<text x="732" y="230" fill="#7ee787">C:\Users\learner</text>
<text x="732" y="258" fill="#cfd9ee">PS </text>
<text x="761" y="258" fill="#9bb4dd">C:\Users\learner</text>
<text x="915" y="258" fill="#cfd9ee">&gt; </text>
<text x="934" y="258" fill="#ffffff">Get-Command pwd</text>
<text x="732" y="286" fill="#7ee787">Alias  pwd -&gt; Get-Location</text>
<text x="732" y="314" fill="#cfd9ee">PS </text>
<text x="761" y="314" fill="#9bb4dd">C:\Users\learner</text>
<text x="915" y="314" fill="#cfd9ee">&gt; </text>

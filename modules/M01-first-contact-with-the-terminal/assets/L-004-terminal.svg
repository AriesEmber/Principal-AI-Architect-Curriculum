<rect x="20" y="474" width="1360" height="34" fill="#141923"/>
<text x="700" y="498" text-anchor="middle" fill="#9aa3b2" font-size="14">pwd prints the current working directory. Identical in Bash. In PowerShell, pwd is an alias for Get-Location.</text>

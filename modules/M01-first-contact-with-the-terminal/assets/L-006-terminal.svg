<text x="186" y="202" fill="#c792ea">~</text>
<text x="196" y="202" fill="#7e8697">$ </text>
<text x="215" y="202" fill="#e6edf3">cd </text>
<text x="244" y="202" fill="#ffab70">Documents</text>
<text x="42" y="230" fill="#8b94a5">(no output)</text>

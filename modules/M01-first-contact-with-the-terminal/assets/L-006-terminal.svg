</g>
<g font-size="13" fill="#8b94a5">
<text x="674" y="146" text-anchor="end">1. Confirm where you stand</text>
<text x="1364" y="146" text-anchor="end">1. Confirm where you stand</text>
<text x="674" y="202" text-anchor="end">2. Walk into a subdirectory</text>
<text x="1364" y="202" text-anchor="end">2. Walk into a subdirectory</text>
<text x="674" y="258" text-anchor="end">3. Confirm the move</text>
<text x="1364" y="258" text-anchor="end">3. Confirm the move</text>
<text x="674" y="314" text-anchor="end">4. Walk back up one level</text>
<text x="1364" y="314" text-anchor="end">4. Walk back up one level</text>
<text x="674" y="370" text-anchor="end">5. Return home</text>
<text x="1364" y="370" text-anchor="end">5. Return home</text>
</g>
<rect x="20" y="530" width="1360" height="34" fill="#141923"/>
<text x="700" y="554" text-anchor="middle" fill="#9aa3b2" font-size="14">cd works the same way in both shells for relative paths, .., and ~. The prompt updates to show where you are.</text>
</svg>
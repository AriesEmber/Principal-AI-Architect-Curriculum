<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="lin-title lin-desc">
  <title id="lin-title">GNOME Activities overlay with "terminal" typed</title>
  <desc id="lin-desc">A Linux GNOME desktop with the Activities overlay open, the word terminal typed into the search bar at the top, and the Terminal application highlighted in the results. An annotation shows the Ctrl plus Alt plus T shortcut as a common alternative.</desc>
  <defs>
    <linearGradient id="linDesk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3C2A55"/>
      <stop offset="1" stop-color="#1C1229"/>
    </linearGradient>
    <linearGradient id="actBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A1B3E" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#1C1229" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="shadowL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ui { font-family: "Cantarell", "Ubuntu", "Noto Sans", system-ui, Arial, sans-serif; }
      .mono { font-family: "Ubuntu Mono", "DejaVu Sans Mono", Consolas, monospace; }
    </style>
  </defs>

  <!-- Desktop -->
  <rect width="1200" height="750" fill="url(#linDesk)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="32" fill="#0F0A18" fill-opacity="0.95"/>
  <text x="22" y="21" class="ui" font-size="13" font-weight="600" fill="#FFFFFF">Activities</text>
  <text x="600" y="21" class="ui" font-size="13" fill="#FFFFFF" text-anchor="middle">Mon Apr 20  09:41</text>
  <text x="1130" y="21" class="ui" font-size="12" fill="#FFFFFF">🔊  📶  ⏻</text>

  <!-- Dimmed activities backdrop -->
  <rect x="0" y="32" width="1200" height="680" fill="url(#actBg)"/>

  <!-- Search bar -->
  <g filter="url(#shadowL)">
    <rect x="390" y="80" width="420" height="50" rx="25" fill="#FFFFFF" fill-opacity="0.98"/>
    <circle cx="422" cy="105" r="10" fill="none" stroke="#6F6F78" stroke-width="2"/>
    <line x1="430" y1="112" x2="438" y2="120" stroke="#6F6F78" stroke-width="2" stroke-linecap="round"/>
    <text x="452" y="112" class="ui" font-size="18" fill="#1F2328">terminal</text>
    <rect x="540" y="94" width="2" height="22" fill="#1F2328">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.5;1;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- App grid results -->
  <g>
    <!-- Highlighted Terminal -->
    <g transform="translate(450,200)">
      <rect x="0" y="0" width="120" height="120" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFD666" stroke-width="2"/>
      <rect x="22" y="22" width="76" height="58" rx="8" fill="#1E1E1E"/>
      <text x="38" y="58" class="mono" font-size="22" fill="#50E8B3" font-weight="700">&gt;_</text>
      <text x="60" y="104" class="ui" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">Terminal</text>
    </g>

    <g transform="translate(590,200)">
      <rect x="0" y="0" width="120" height="120" rx="16" fill="#FFFFFF" fill-opacity="0.05"/>
      <rect x="22" y="22" width="76" height="58" rx="8" fill="#2E2E2E"/>
      <text x="60" y="104" class="ui" font-size="13" fill="#CCC9D9" text-anchor="middle">Files</text>
    </g>

    <g transform="translate(730,200)">
      <rect x="0" y="0" width="120" height="120" rx="16" fill="#FFFFFF" fill-opacity="0.05"/>
      <rect x="22" y="22" width="76" height="58" rx="8" fill="#2E2E2E"/>
      <text x="60" y="104" class="ui" font-size="13" fill="#CCC9D9" text-anchor="middle">Tweaks</text>
    </g>

    <g transform="translate(310,200)">
      <rect x="0" y="0" width="120" height="120" rx="16" fill="#FFFFFF" fill-opacity="0.05"/>
      <rect x="22" y="22" width="76" height="58" rx="8" fill="#2E2E2E"/>
      <text x="60" y="104" class="ui" font-size="13" fill="#CCC9D9" text-anchor="middle">Text Editor</text>
    </g>
  </g>

  <!-- Dock at bottom -->
  <g transform="translate(420,640)">
    <rect x="0" y="0" width="360" height="60" rx="12" fill="#0F0A18" fill-opacity="0.7"/>
    <rect x="16" y="12" width="36" height="36" rx="8" fill="#5FA3D1"/>
    <rect x="68" y="12" width="36" height="36" rx="8" fill="#E67E22"/>
    <rect x="120" y="12" width="36" height="36" rx="8" fill="#27AE60"/>
    <rect x="172" y="12" width="36" height="36" rx="8" fill="#1E1E1E" stroke="#FFD666" stroke-width="2"/>
    <text x="190" y="38" class="mono" font-size="16" fill="#50E8B3" font-weight="700" text-anchor="middle">&gt;_</text>
    <rect x="224" y="12" width="36" height="36" rx="8" fill="#8E44AD"/>
    <rect x="276" y="12" width="36" height="36" rx="8" fill="#C0392B"/>
  </g>

  <!-- Keyboard visual for Ctrl+Alt+T -->
  <g transform="translate(880,400)">
    <rect x="0" y="0" width="70" height="50" rx="8" fill="#FFFFFF" fill-opacity="0.95"/>
    <text x="35" y="32" class="ui" font-size="14" font-weight="600" text-anchor="middle" fill="#1F2328">Ctrl</text>
    <text x="82" y="32" class="ui" font-size="22" font-weight="700" fill="#FFFFFF">+</text>
    <rect x="100" y="0" width="70" height="50" rx="8" fill="#FFFFFF" fill-opacity="0.95"/>
    <text x="135" y="32" class="ui" font-size="14" font-weight="600" text-anchor="middle" fill="#1F2328">Alt</text>
    <text x="182" y="32" class="ui" font-size="22" font-weight="700" fill="#FFFFFF">+</text>
    <rect x="200" y="0" width="50" height="50" rx="8" fill="#FFFFFF" fill-opacity="0.95"/>
    <text x="225" y="32" class="ui" font-size="16" font-weight="700" text-anchor="middle" fill="#1F2328">T</text>
  </g>

  <!-- Annotation -->
  <g>
    <path d="M 570 220 Q 700 280 860 380" stroke="#FFD666" stroke-width="2.5" fill="none" stroke-dasharray="4 4"/>
    <circle cx="570" cy="220" r="5" fill="#FFD666"/>
    <rect x="860" y="480" width="300" height="100" rx="10" fill="#0F0A18" fill-opacity="0.9" stroke="#FFD666" stroke-width="1.5"/>
    <text x="875" y="508" class="ui" font-size="13" font-weight="700" fill="#FFFFFF">Step 3: Linux (GNOME)</text>
    <text x="875" y="528" class="ui" font-size="12" fill="#FFFFFF">Press the Super key, type "terminal",</text>
    <text x="875" y="543" class="ui" font-size="12" fill="#FFFFFF">press Enter. Or use the classic</text>
    <text x="875" y="558" class="ui" font-size="12" fill="#FFFFFF">shortcut Ctrl + Alt + T on Ubuntu</text>
    <text x="875" y="573" class="ui" font-size="12" fill="#FFFFFF">and most other distributions.</text>
  </g>

  <text x="600" y="730" class="ui" font-size="14" fill="#FFFFFF" fill-opacity="0.75" text-anchor="middle">GNOME Activities overlay, the Terminal app highlighted after typing the search word</text>
</svg>

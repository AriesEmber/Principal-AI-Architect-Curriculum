<circle cx="752" cy="100" r="7" fill="#febc2e"/>
<circle cx="772" cy="100" r="7" fill="#28c840"/>
<text x="1045" y="106" text-anchor="middle" fill="#cfd9ee" font-size="13">PowerShell · Windows</text>
<g font-size="28"><text x="60" y="212" fill="#6aa7ff">learner</text><text x="186" y="212" fill="#7e8697">@</text><text x="208" y="212" fill="#f99e9e">laptop</text><text x="310" y="212" fill="#7e8697">:</text><text x="326" y="212" fill="#c792ea">~/projects</text><text x="508" y="212" fill="#ffd666">$</text></g>
<g font-size="28"><text x="750" y="212" fill="#cfd9ee">PS</text><text x="804" y="212" fill="#9bb4dd">C:\Users\learner</text><text x="1090" y="212" fill="#ffd666">&gt;</text></g>
<rect x="20" y="390" width="1360" height="40" fill="#141923"/>
<text x="700" y="418" text-anchor="middle" fill="#9aa3b2" font-size="14" font-family="-apple-system,Arial,sans-serif">Both prompts answer: who, where, and what comes next. Bash packs user@machine:path$; PowerShell compresses to PS path &gt;.</text>

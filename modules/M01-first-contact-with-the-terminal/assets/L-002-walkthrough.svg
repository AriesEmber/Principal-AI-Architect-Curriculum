<circle cx="42" cy="100" r="7" fill="#ff5f57"/>
<circle cx="62" cy="100" r="7" fill="#febc2e"/>
<circle cx="82" cy="100" r="7" fill="#28c840"/>
<text x="355" y="106" text-anchor="middle" fill="#9aa3b2" font-size="13">Bash · macOS / Linux / WSL</text>
<rect x="710" y="80" width="670" height="290" rx="12" ry="12" fill="url(#psbg)" stroke="#1c4d8c" stroke-width="1.5"/>
<rect x="710" y="80" width="670" height="40" rx="12" ry="12" fill="#0a3a73"/>

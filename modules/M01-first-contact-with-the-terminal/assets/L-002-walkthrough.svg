<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 440" width="1400" height="440" font-family="'SF Mono','Fira Code','Consolas',monospace">
<defs><linearGradient id="bashbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b2029"/><stop offset="1" stop-color="#12161d"/></linearGradient><linearGradient id="psbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#012456"/><stop offset="1" stop-color="#011736"/></linearGradient></defs>
<rect width="1400" height="440" fill="#0b0d12"/>
<text x="700" y="40" text-anchor="middle" fill="#cdd5e0" font-size="19" font-weight="600" font-family="-apple-system,Arial,sans-serif">L-002 · the prompt is a sign · Bash vs PowerShell</text>
<rect x="20" y="80" width="670" height="290" rx="12" ry="12" fill="url(#bashbg)" stroke="#2a3140" stroke-width="1.5"/>
<rect x="20" y="80" width="670" height="40" rx="12" ry="12" fill="#262c38"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" font-family="'SF Mono','Fira Code','Consolas',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2029"/>
      <stop offset="1" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="820" fill="#0b0d12"/>
  <!-- Terminal window frame -->
  <rect x="60" y="60" width="1080" height="700" rx="14" ry="14" fill="url(#bg)" stroke="#2a3140" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="60" y="60" width="1080" height="44" rx="14" ry="14" fill="#262c38"/>
  <rect x="60" y="90" width="1080" height="14" fill="#262c38"/>
  <!-- Traffic-light dots -->
  <circle cx="88"  cy="82" r="7" fill="#ff5f57"/>
  <circle cx="110" cy="82" r="7" fill="#febc2e"/>
  <circle cx="132" cy="82" r="7" fill="#28c840"/>
  <!-- Title -->
  <text x="600" y="87" text-anchor="middle" fill="#9aa3b2" font-size="14">L-005 &#183; ls &#183; bash</text>

  <!-- Body text -->
  <g font-size="20" xml:space="preserve">
    <!-- 1. plain ls -->
    <text x="95" y="145" fill="#6aa7ff">learner@laptop</text><text x="283" y="145" fill="#7e8697">:</text><text x="293" y="145" fill="#c792ea">~</text><text x="310" y="145" fill="#7e8697">$</text><text x="327" y="145" fill="#e6edf3">ls</text>
    <text x="95" y="174" fill="#7ee787">Desktop  Documents  Downloads  Music  Pictures  Public  Templates  Videos</text>

    <!-- 2. ls -la -->
    <text x="95" y="214" fill="#6aa7ff">learner@laptop</text><text x="283" y="214" fill="#7e8697">:</text><text x="293" y="214" fill="#c792ea">~</text><text x="310" y="214" fill="#7e8697">$</text><text x="327" y="214" fill="#e6edf3">ls </text><text x="360" y="214" fill="#f2cc60">-la</text>
    <text x="95" y="243" fill="#9aa3b2">total 28</text>
    <text x="95" y="272" fill="#7ee787">drwxr-xr-x 12 learner learner 4096 Apr 18 10:15 .</text>
    <text x="95" y="301" fill="#7ee787">drwxr-xr-x  3 root    root    4096 Apr 10 14:22 ..</text>
    <text x="95" y="330" fill="#7ee787">-rw-------  1 learner learner  128 Apr 18 10:15 .bash_history</text>
    <text x="95" y="359" fill="#7ee787">-rw-r--r--  1 learner learner 3771 Apr 10 14:22 .bashrc</text>
    <text x="95" y="388" fill="#7ee787">drwxr-xr-x  2 learner learner 4096 Apr 15 11:00 Documents</text>
    <text x="95" y="417" fill="#7ee787">drwxr-xr-x  2 learner learner 4096 Apr 15 11:00 Downloads</text>

    <!-- 3. ls / (pass a path as an argument) -->
    <text x="95" y="457" fill="#6aa7ff">learner@laptop</text><text x="283" y="457" fill="#7e8697">:</text><text x="293" y="457" fill="#c792ea">~</text><text x="310" y="457" fill="#7e8697">$</text><text x="327" y="457" fill="#e6edf3">ls </text><text x="360" y="457" fill="#f2cc60">/</text>
    <text x="95" y="486" fill="#7ee787">bin  boot  dev  etc  home  lib  opt  proc  root  sbin  tmp  usr  var</text>

    <!-- 4. PowerShell alias check -->
    <text x="95" y="526" fill="#6aa7ff">PS</text><text x="128" y="526" fill="#c792ea">C:\Users\learner</text><text x="374" y="526" fill="#7e8697">&gt;</text><text x="393" y="526" fill="#e6edf3">Get-Command ls</text>
    <text x="95" y="555" fill="#7ee787">CommandType     Name    Source</text>
    <text x="95" y="584" fill="#7ee787">-----------     ----    ------</text>
    <text x="95" y="613" fill="#7ee787">Alias           ls -&gt; Get-ChildItem</text>

    <!-- waiting prompt -->
    <text x="95" y="663" fill="#6aa7ff">learner@laptop</text><text x="283" y="663" fill="#7e8697">:</text><text x="293" y="663" fill="#c792ea">~</text><text x="310" y="663" fill="#7e8697">$</text>
    <rect x="332" y="645" width="11" height="22" fill="#e6edf3">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Footnotes (right side) -->
  <g font-size="15" fill="#8b94a5">
    <text x="860" y="145">1. Plain ls (visible entries)</text>
    <text x="860" y="214">2. ls -la (details and dotfiles)</text>
    <text x="860" y="457">3. ls / (pass a path)</text>
    <text x="860" y="526">4. PowerShell alias check</text>
  </g>

  <!-- Caption strip -->
  <rect x="60" y="720" width="1080" height="40" fill="#141923"/>
  <text x="600" y="746" text-anchor="middle" fill="#9aa3b2" font-size="16">ls lists the entries of a directory. -l adds details, -a includes dotfiles. Column one: d is a folder, - is a file.</text>
</svg>

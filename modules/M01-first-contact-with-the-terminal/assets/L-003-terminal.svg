<g font-size="13" fill="#8b94a5">
<text x="674" y="146" text-anchor="end">1. No quotes</text>
<text x="1364" y="146" text-anchor="end">1. No quotes</text>
<text x="674" y="202" text-anchor="end">2. Double quotes</text>

<rect x="20" y="530" width="1360" height="34" fill="#141923"/>
<text x="700" y="554" text-anchor="middle" fill="#9aa3b2" font-size="14">Steps 1 to 4 behave identically. Step 5 uses different syntax to look up the same value.</text>

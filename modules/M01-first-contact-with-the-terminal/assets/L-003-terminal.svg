<text x="1364" y="258" text-anchor="end">3. Single quotes</text>
<text x="674" y="314" text-anchor="end">4. No arguments</text>
<text x="1364" y="314" text-anchor="end">4. No arguments</text>
<text x="674" y="370" text-anchor="end">5. Variable</text>
<text x="1364" y="370" text-anchor="end">5. Variable</text>

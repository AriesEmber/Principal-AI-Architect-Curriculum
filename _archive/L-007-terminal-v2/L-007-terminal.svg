<text x="1045" y="96" text-anchor="middle" fill="#cfd9ee" font-size="13">PowerShell · Windows</text>
<rect x="711" y="678" width="668" height="55" fill="#031a3a"/>
<text x="726" y="698" fill="#cfd9ee" font-size="13">PowerShell: mkdir wraps New-Item -ItemType Directory. Use New-Item for files, Remove-Item</text>
<text x="726" y="716" fill="#cfd9ee" font-size="13">-Recurse to delete trees.</text>

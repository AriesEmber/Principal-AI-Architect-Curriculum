<text x="355" y="96" text-anchor="middle" fill="#9aa3b2" font-size="13">Bash · macOS / Linux / WSL</text>
<rect x="21" y="678" width="668" height="55" fill="#141923"/>
<text x="36" y="698" fill="#9aa3b2" font-size="13">Bash: mkdir, touch, rm -r are separate programs. Creation is silent; removal is recursive</text>
<text x="36" y="716" fill="#9aa3b2" font-size="13">when -r is passed.</text>
<rect x="710" y="70" width="670" height="664" rx="12" ry="12" fill="url(#psbg)" stroke="#1c4d8c" stroke-width="1.5"/>
